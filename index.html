<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08090d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NYC Dining">
  <title>NYC Dining Companion</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root {
      --bg: #08090d;
      --surface: rgba(255, 255, 255, 0.04);
      --surface2: rgba(255, 255, 255, 0.08);
      --text: #f5f3f0;
      --text2: #9ca3af;
      --accent: linear-gradient(135deg, #f7c948, #fde68a);
      --accent-solid: #f7c948;
      --accent2: #d4a72c;
      --matt: #6b9bd2;
      --denise: #d4789c;
      --green: #6bba7a;
      --red: #ef4444;
      --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
      --safe-bottom: max(1rem, env(safe-area-inset-bottom));
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      overflow: hidden;
    }

    .container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      background: transparent;
      z-index: 1;
    }

    .header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: none;
      backdrop-filter: none;
      background: transparent;
      z-index: 100;
      position: relative;
    }

    .header h1 {
      font-family: DM Sans, -apple-system, sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
      margin-bottom: 0;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

    .header h1 span {
      color: #f7c948;
    }

    .header-subtitle {
      display: none;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(80px + var(--safe-bottom));
    }

    .view {
      display: none;
      animation: fadeIn 0.3s var(--ease);
    }

    .view.active {
      display: block;
    }

    /* Non-home views get opaque dark background so text is readable over video */
    .view:not(#homeView) {
      background: var(--bg);
      min-height: 100%;
      position: relative;
      z-index: 2;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Login Screen — Aesop-inspired video hero */
    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      background: #000;
      z-index: 300;
      padding: 0;
      text-align: center;
      overflow: hidden;
    }

    .login-video-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
      opacity: 0.85;
    }

    .login-screen::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.0) 0%,
        rgba(0,0,0,0.0) 40%,
        rgba(0,0,0,0.15) 65%,
        rgba(0,0,0,0.8) 100%
      );
      z-index: 1;
    }

    .login-content {
      position: relative;
      z-index: 2;
      padding: 0 2rem calc(3rem + env(safe-area-inset-bottom));
      width: 100%;
      max-width: 400px;
    }

    .login-screen.hidden {
      display: none;
    }

    .login-logo {
      font-family: DM Sans, -apple-system, sans-serif;
      font-size: 56px;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #fff;
      letter-spacing: -2px;
      line-height: 1.05;
      text-shadow: 0 2px 40px rgba(0,0,0,0.5);
    }

    .login-logo span {
      color: #f7c948;
    }

    .login-tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2.5rem;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 400;
    }

    .login-btn {
      width: 100%;
      padding: 1rem 2rem;
      background: rgba(255,255,255,0.95);
      color: #111;
      border: none;
      border-radius: 0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: Inter, sans-serif;
    }

    .login-btn:hover {
      background: #fff;
      transform: none;
      box-shadow: 0 4px 30px rgba(255,255,255,0.15);
    }

    /* App background — ambient video */
    .app-video-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      overflow: hidden;
      background: #000;
    }

    .app-video-bg video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      opacity: 0.45;
      filter: brightness(0.8) saturate(0.7);
    }

    .app-video-bg::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0.4) 20%,
        rgba(0,0,0,0.35) 40%,
        rgba(0,0,0,0.35) 60%,
        rgba(0,0,0,0.4) 80%,
        rgba(0,0,0,0.7) 100%
      );
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(56px + var(--safe-bottom));
      padding: 0 0 var(--safe-bottom) 0;
      border-top: none;
      backdrop-filter: blur(20px);
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: space-around;
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      cursor: pointer;
      color: rgba(255,255,255,0.3);
      transition: all 0.3s var(--ease);
      position: relative;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .nav-item.active {
      color: var(--accent-solid);
    }

    .nav-item.active::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 2px;
      background: var(--accent-solid);
    }

    .nav-icon {
      width: 20px;
      height: 20px;
    }

    .nav-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item * {
      pointer-events: none;
    }

    /* Glass Cards */
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2px;
      padding: 1.25rem;
      backdrop-filter: blur(20px);
      transition: all 0.4s var(--ease);
    }

    .card:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
    }

    /* Grid Layouts */
    .grid {
      display: grid;
      gap: 1rem;
      padding: 1rem;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      backdrop-filter: blur(20px);
    }

    .stat-number {
      font-family: DM Sans, -apple-system, sans-serif;
      font-size: 32px;
      font-weight: 700;
      background: var(--accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Restaurant Cards */
    .restaurant-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2px;
      padding: 1.25rem;
      backdrop-filter: blur(20px);
      transition: all 0.4s var(--ease);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
      overflow: hidden;
    }

    .restaurant-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-2px);
    }

    .restaurant-card * {
      pointer-events: none;
    }

    /* Detail action buttons row */
    .detail-actions-row {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      flex-wrap: wrap;
    }

    .detail-actions-row .btn {
      flex: 1;
      min-width: 0;
      text-align: center;
      font-size: 12px;
      padding: 0.6rem 0.75rem;
    }

    .detail-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      margin: 1rem 1.5rem 0;
      cursor: pointer;
      color: var(--accent-solid);
      font-size: 13px;
      font-weight: 500;
      background: none;
      border: none;
      transition: opacity 0.2s;
    }

    .detail-back-btn:hover {
      opacity: 0.7;
    }

    .detail-back-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .source-badge {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: transparent;
      color: rgba(255,255,255,0.3);
      padding: 0;
      border-radius: 0;
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .restaurant-name {
      font-family: DM Sans, -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .restaurant-meta {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }

    .cuisine-pills {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pill {
      background: transparent;
      color: rgba(255,255,255,0.4);
      padding: 0.2rem 0;
      border-radius: 0;
      font-size: 10px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pill + .pill::before {
      content: '·';
      margin-right: 0.5rem;
      color: rgba(255,255,255,0.2);
    }

    .ratings-display {
      display: flex;
      gap: 1rem;
      font-size: 13px;
      align-items: center;
      flex-wrap: wrap;
    }

    .rating-mini {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .rating-mini.matt {
      color: var(--matt);
    }

    .rating-mini.denise {
      color: var(--denise);
    }

    .external-ratings {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      font-size: 10px;
      color: var(--text2);
    }

    .external-badge {
      background: rgba(255, 255, 255, 0.05);
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--surface2);
    }

    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 0;
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-wishlist {
      background: transparent;
      color: rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .status-visited {
      background: transparent;
      color: var(--green);
      border: 1px solid rgba(107, 186, 122, 0.3);
    }

    .status-favorite {
      background: transparent;
      color: var(--accent-solid);
      border: 1px solid rgba(212, 165, 116, 0.3);
    }

    /* Discovery Cards */
    .discovery-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2px;
      padding: 1.25rem;
      backdrop-filter: blur(20px);
      transition: all 0.4s var(--ease);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .discovery-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .discovery-info {
      flex: 1;
    }

    .discovery-name {
      font-family: DM Sans, -apple-system, sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .discovery-source {
      font-size: 12px;
      color: var(--accent-solid);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .discovery-date {
      font-size: 11px;
      color: var(--text2);
      margin-top: 0.25rem;
    }

    .discovery-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    /* Buttons — sharp, editorial */
    .btn {
      border: none;
      border-radius: 0;
      padding: 0.75rem 1.25rem;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      font-family: Inter, sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: rgba(255,255,255,0.9);
      color: #111;
    }

    .btn-primary:hover {
      background: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.4);
      color: #fff;
    }

    .btn-small {
      padding: 0.5rem 0.75rem;
      font-size: 10px;
    }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover {
      border-color: var(--red);
    }

    /* Search & Filters */
    .search-section {
      padding: 1rem;
      border-bottom: 1px solid var(--surface2);
    }

    .search-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      padding: 0.75rem 0;
      border-radius: 0;
      font-size: 14px;
      font-family: Inter, sans-serif;
      transition: all 0.3s var(--ease);
    }

    .search-input::placeholder {
      color: rgba(255,255,255,0.25);
      font-style: italic;
    }

    .search-input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.3);
    }

    .filter-chips {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 0.5rem;
      -webkit-overflow-scrolling: touch;
    }

    .chip {
      background: transparent;
      color: rgba(255,255,255,0.4);
      padding: 0.4rem 0.75rem;
      border-radius: 0;
      cursor: pointer;
      white-space: nowrap;
      font-size: 11px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s var(--ease);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chip.active {
      background: transparent;
      color: #fff;
      border-color: #fff;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: flex-end;
      z-index: 200;
      animation: fadeIn 0.2s var(--ease);
    }

    .modal-overlay.hidden {
      display: none;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal {
      width: 100%;
      max-width: 100%;
      background: rgba(20, 22, 28, 0.97);
      border-radius: 0;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 1.5rem;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s var(--ease);
      padding-bottom: calc(1.5rem + var(--safe-bottom));
      backdrop-filter: blur(40px);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--surface2);
    }

    .modal-title {
      font-family: DM Sans, -apple-system, sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 24px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s var(--ease);
    }

    .modal-close:hover {
      color: var(--accent-solid);
      transform: scale(1.1);
    }

    /* Forms */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      padding: 0.75rem 0;
      border-radius: 0;
      font-size: 14px;
      font-family: Inter, sans-serif;
      transition: all 0.3s var(--ease);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: rgba(255,255,255,0.4);
      background: transparent;
    }

    .form-select {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.75rem;
    }

    .star-input {
      display: flex;
      gap: 0.5rem;
      font-size: 24px;
    }

    .star {
      cursor: pointer;
      user-select: none;
      transition: all 0.1s var(--ease);
      color: var(--text2);
    }

    .star:hover, .star.active {
      color: var(--accent-solid);
      transform: scale(1.15);
    }

    .rating-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .ratings-bar {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .bar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: right;
      min-width: 60px;
    }

    .pref-textarea {
      width: 100%;
      min-height: 100px;
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 0;
      color: var(--text);
      font-family: Inter, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 1rem;
      resize: vertical;
      transition: border-color 0.2s;
    }

    .pref-textarea:focus {
      outline: none;
      border-color: var(--accent-solid);
    }

    .pref-textarea::placeholder {
      color: var(--text2);
      opacity: 0.6;
    }

    .pref-saved-msg {
      font-size: 11px;
      color: var(--accent-solid);
      margin-top: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .bar-fill {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-value {
      height: 100%;
      background: linear-gradient(90deg, #6b9bd2, #d4789c);
      border-radius: 2px;
      transition: width 0.3s var(--ease);
    }

    /* Detail View */
    .detail-hero {
      padding: 2rem 1.5rem;
      border-bottom: 1px solid var(--surface2);
      margin-bottom: 1rem;
    }

    .detail-name {
      font-family: DM Sans, -apple-system, sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }

    .detail-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 1rem;
    }

    .detail-section {
      padding: 1.5rem;
      border-bottom: 1px solid var(--surface2);
    }

    .detail-section-title {
      font-family: DM Sans, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .ratings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .rating-column {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 8px;
      padding: 1rem;
    }

    .rating-head {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.75rem;
    }

    .rating-head.matt {
      color: var(--matt);
    }

    .rating-head.denise {
      color: var(--denise);
    }

    .rating-stars {
      font-size: 20px;
      display: flex;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
    }

    .rating-notes {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.4;
      font-style: italic;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .timeline-item {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 8px;
      padding: 1rem;
      position: relative;
      padding-left: 1.5rem;
    }

    .timeline-dot {
      position: absolute;
      left: 0;
      top: 1.5rem;
      width: 8px;
      height: 8px;
      background: var(--accent-solid);
      border-radius: 50%;
      margin-left: 8px;
    }

    .timeline-date {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-solid);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .timeline-occasion {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 0.5rem;
    }

    .timeline-note {
      font-size: 13px;
      color: var(--text);
      font-style: italic;
      line-height: 1.4;
    }

    /* Home View */
    .spotlight-card {
      background: linear-gradient(135deg, rgba(212, 165, 116, 0.1) 0%, rgba(212, 165, 116, 0.05) 100%);
      border: 1px solid rgba(212, 165, 116, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1rem;
      cursor: pointer;
      transition: all 0.3s var(--ease);
    }

    .spotlight-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(212, 165, 116, 0.2);
    }

    /* Map View */
    .map-container {
      padding: 1rem;
      height: calc(100vh - 160px);
      overflow-y: auto;
    }

    .neighborhood {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }

    .neighborhood:hover {
      background: var(--surface2);
      border-color: var(--accent-solid);
    }

    .neighborhood-name {
      font-weight: 600;
      color: var(--accent-solid);
      margin-bottom: 0.5rem;
    }

    .neighborhood-count {
      font-size: 12px;
      color: var(--text2);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-solid);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .rating-inputs {
        grid-template-columns: 1fr;
      }

      .detail-name {
        font-size: 24px;
      }
    }
  </style>
</head>

    // ============ FIREBASE INIT ============
    async function initFirebase() {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js');
      const { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } = await import('https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js');
      const { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } = await import('https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js');

      window.firebaseModules = { initializeApp, getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, getFirestore, collection, getDocs, doc, setDoc, deleteDoc };

      const app = initializeApp(firebaseConfig);
      S.auth = getAuth(app);
      S.db = getFirestore(app);

      onAuthStateChanged(S.auth, async (user) => {
        if (user) {
          set({ user, currentView: 'home' });
          await loadRestaurants();
          await loadDiscoveries();
          await loadDiningPrefs();
        } else {
          set({ user: null, currentView: 'login' });
        }
      });

    // ============ FIRESTORE OPERATIONS ============
    async function loadRestaurants() {
      if (!S.user || !S.db) return;
      const { collection, getDocs } = window.firebaseModules;
      const ref = collection(S.db, `users/${S.user.uid}/restaurants`);
      const snap = await getDocs(ref);
      const restaurants = [];
      snap.forEach(doc => restaurants.push({ id: doc.id, ...doc.data() }));
      set({ restaurants: restaurants.length > 0 ? restaurants : SEED_DATA });
    }

    async function loadDiscoveries() {
      if (!S.user || !S.db) return;
      const { collection, getDocs } = window.firebaseModules;
      const ref = collection(S.db, `users/${S.user.uid}/discoveries`);
      const snap = await getDocs(ref);
      const discoveries = [];
      snap.forEach(doc => discoveries.push({ id: doc.id, ...doc.data() }));
      set({ discoveries });
    }

    async function saveRestaurant(restaurant) {
      if (!S.user || !S.db) return;
      const { doc, setDoc, collection } = window.firebaseModules;
      const ref = doc(S.db, `users/${S.user.uid}/restaurants`, restaurant.id || 'new');
      await setDoc(ref, restaurant, { merge: true });
      await loadRestaurants();
    }

    async function deleteRestaurant(id) {
      if (!S.user || !S.db || !confirm("Delete this restaurant?")) return;
      const { doc, deleteDoc } = window.firebaseModules;
      await deleteDoc(doc(S.db, `users/${S.user.uid}/restaurants`, id));
      await loadRestaurants();
      set({ currentView: 'collection' });
    }

    async function saveDiscovery(discovery) {
      if (!S.user || !S.db) return;
      const { doc, setDoc } = window.firebaseModules;
      const ref = doc(S.db, `users/${S.user.uid}/discoveries`, discovery.id || Date.now().toString());
      await setDoc(ref, discovery, { merge: true });
      await loadDiscoveries();
    }

      document.querySelectorAll('.chip').forEach(el => el.classList.remove('active'));

    window.onRestaurantClick = (id) => {
      const restaurant = S.restaurants.find(r => r.id === id);
      if (restaurant) {
        set({ selectedRestaurant: restaurant, currentView: 'detail' });
      }
    };

    window.onDiscoveryAction = (action, id, source) => {
      if (action === 'add') {
        const discovery = S.discoveries.find(d => d.id === id);
        if (discovery) {
          const newId = Date.now().toString();
          saveRestaurant({
            id: newId,
            name: discovery.name,
            source: { name: discovery.source.name },
            status: 'wishlist',
            externalRatings: {},
          });
          saveDiscovery({ ...discovery, status: 'added', addedAsRestaurantId: newId });
        }
      } else if (action === 'dismiss') {
        const discovery = S.discoveries.find(d => d.id === id);
        if (discovery) {
          saveDiscovery({ ...discovery, status: 'dismissed' });
        }
      } else if (action === 'research') {
        const discovery = S.discoveries.find(d => d.id === id);
        if (discovery) {
          window.open(`https://www.google.com/search?q="${discovery.name}" restaurant NYC`, '_blank');
        }
      }
    };

      document.getElementById('restaurantName').value = r.name || '';

    // ============ FORM HANDLERS ============
    document.addEventListener('submit', async (e) => {
      if (e.target.id === 'addSourceForm') {

        const names = document.getElementById('restaurantNames').value.split('\n').filter(n => n.trim());

        for (const name of names) {
          const discovery = {

            dateFound: new Date().toISOString().split('T')[0],

    // ============ STAR INPUT LOGIC ============
    function createStarInput(containerId, onChange) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (let i = 1; i <= 5; i++) {
        const star = document.createElement('span');
        star.className = 'star';
        star.textContent = '★';
        star.onclick = () => {
          updateStarDisplay(containerId, i);
          onChange?.(i);
        };
        container.appendChild(star);
      }
    }

    function updateStarDisplay(containerId, rating) {
      const container = document.getElementById(containerId);
      const stars = container.querySelectorAll('.star');
      stars.forEach((star, i) => {
        star.classList.toggle('active', i < rating);
      });
    }

    function getRating(containerId) {
      const container = document.getElementById(containerId);
      return container.querySelectorAll('.star.active').length;
    }

    function clearStarInputs() {
      createStarInput('mattRatingInput');
      createStarInput('deniseRatingInput');
      createStarInput('visitMattRatingInput');
      createStarInput('visitDeniseRatingInput');
    }

    function populateExternalRatings(ratings) {
      document.getElementById('googleScore').value = ratings.google?.score || '';
      document.getElementById('googleUrl').value = ratings.google?.url || '';
      document.getElementById('michelinStars').value = ratings.michelin?.stars || '';
      document.getElementById('infatuationScore').value = ratings.infatuation?.score || '';
      document.getElementById('infatuationUrl').value = ratings.infatuation?.url || '';
    }

    function getExternalRatings() {
      const ratings = {};
      const googleScore = parseFloat(document.getElementById('googleScore').value);
      if (googleScore) ratings.google = { score: googleScore, url: document.getElementById('googleUrl').value };
      const michelin = document.getElementById('michelinStars').value;
      if (michelin) ratings.michelin = { stars: michelin };
      const infatuation = parseFloat(document.getElementById('infatuationScore').value);
      if (infatuation) ratings.infatuation = { score: infatuation, url: document.getElementById('infatuationUrl').value };
      return ratings;
    }

        document.getElementById('appContainer').style.display = 'flex';
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('appContainer').style.display = 'none';
      }
    }

    function renderStats() {
      const total = S.restaurants.length;
      const favorites = S.restaurants.filter(r => r.status === 'favorite').length;
      const visited = S.restaurants.filter(r => r.status === 'visited' || r.status === 'favorite').length;
      const wishlist = S.restaurants.filter(r => r.status === 'wishlist').length;

      document.getElementById('totalCount').textContent = total;
      document.getElementById('favoritesCount').textContent = favorites;
      document.getElementById('visitedCount').textContent = visited;
      document.getElementById('wishlistCount').textContent = wishlist;

      const newDiscoveries = S.discoveries.filter(d => d.status === 'new').length;
      document.getElementById('discoveryCount').textContent = newDiscoveries > 0 ? `${newDiscoveries} new discoveries waiting — check Discover` : '';

      // Hero recommendation — disabled for now (home is video-only)
      const heroEl = document.getElementById('heroRecommendation');
      if (heroEl) heroEl.style.display = 'none';
    }

    function renderRestaurantGrid() {
      let filtered = S.restaurants;

      if (S.filterStatus !== 'all') {
        filtered = filtered.filter(r => r.status === S.filterStatus);
      }

      if (S.searchQuery) {
        filtered = filtered.filter(r => r.name.toLowerCase().includes(S.searchQuery) || (r.neighborhood || '').toLowerCase().includes(S.searchQuery));
      }

      filtered.sort((a, b) => a.name.localeCompare(b.name));

      const grid = document.getElementById('restaurantGrid');
      grid.innerHTML = filtered.map(r => `
        <div class="restaurant-card" data-id="${r.id}">
          <div class="restaurant-name">${r.name}</div>
          <div class="restaurant-meta">
            <span>${r.neighborhood || ''}</span>
            ${r.neighborhood && (r.cuisine||[]).length ? '<span>·</span>' : ''}
            <span>${(r.cuisine || []).slice(0,1).join('')}</span>
          </div>
        </div>
      `).join('');
    }

    function renderDetail() {
      const r = S.selectedRestaurant;
      if (!r) return;

      document.getElementById('detailName').textContent = r.name;
      document.getElementById('detailMeta').innerHTML = `
        <span>${r.neighborhood}</span>
        <span>${'$'.repeat(r.priceRange || 1)}</span>
        <span>${(r.cuisine || []).join(', ')}</span>
      `;
      document.getElementById('detailAddress').textContent = r.address || '';

      // Website button
      const webBtn = document.getElementById('detailWebsiteBtn');
      if (r.externalLinks?.website || r.website) {
        webBtn.style.display = '';
        webBtn.onclick = () => window.open(r.externalLinks?.website || r.website, '_blank');
      } else {
        webBtn.style.display = 'none';
      }

      let ratingsHtml = '<div class="detail-section">';
      ratingsHtml += '<h3 class="detail-section-title">Ratings</h3>';
      ratingsHtml += '<div class="ratings-grid">';

      if (r.mattRating || r.mattNotes) {
        ratingsHtml += `
          <div class="rating-column">
            <div class="rating-head matt">Matt</div>
            ${r.mattRating ? `<div class="rating-stars">${'★'.repeat(r.mattRating)}${'☆'.repeat(5-r.mattRating)}</div>` : ''}
            ${r.mattNotes ? `<div class="rating-notes">"${r.mattNotes}"</div>` : ''}
          </div>
        `;
      }

      if (r.deniseRating || r.deniseNotes) {
        ratingsHtml += `
          <div class="rating-column">
            <div class="rating-head denise">Denise</div>
            ${r.deniseRating ? `<div class="rating-stars">${'★'.repeat(r.deniseRating)}${'☆'.repeat(5-r.deniseRating)}</div>` : ''}
            ${r.deniseNotes ? `<div class="rating-notes">"${r.deniseNotes}"</div>` : ''}
          </div>
        `;
      }

      ratingsHtml += '</div></div>';
      document.getElementById('detailRatings').innerHTML = ratingsHtml;

      let externalHtml = '';
      if (Object.keys(r.externalRatings || {}).length > 0) {
        externalHtml = '<div class="detail-section"><h3 class="detail-section-title">External Ratings</h3>';
        if (r.externalRatings.google?.score) externalHtml += `<div style="margin-bottom: 0.5rem;"><strong>Google:</strong> ${r.externalRatings.google.score}/5</div>`;
        if (r.externalRatings.michelin?.stars) externalHtml += `<div style="margin-bottom: 0.5rem;"><strong>Michelin:</strong> ${'★'.repeat(r.externalRatings.michelin.stars === 'bib' ? 0 : parseInt(r.externalRatings.michelin.stars))} ${r.externalRatings.michelin.stars === 'bib' ? 'Bib' : ''}</div>`;
        if (r.externalRatings.infatuation?.score) externalHtml += `<div style="margin-bottom: 0.5rem;"><strong>Infatuation:</strong> ${r.externalRatings.infatuation.score}/10</div>`;
        externalHtml += '</div>';
      }
      document.getElementById('detailExternalRatings').innerHTML = externalHtml;

      let visitsHtml = '';
      if ((r.visits || []).length > 0) {
        visitsHtml = '<div class="detail-section"><h3 class="detail-section-title">Visit History</h3><div class="timeline">';
        r.visits.forEach(v => {
          visitsHtml += `
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div class="timeline-date">${v.date}</div>
              <div class="timeline-occasion">${v.occasion}</div>
              ${v.mattRating ? `<div style="font-size: 12px; margin-bottom: 0.5rem;">M: ${'★'.repeat(v.mattRating)}${'☆'.repeat(5-v.mattRating)}</div>` : ''}
              ${v.deniseRating ? `<div style="font-size: 12px; margin-bottom: 0.5rem;">D: ${'★'.repeat(v.deniseRating)}${'☆'.repeat(5-v.deniseRating)}</div>` : ''}
              ${v.wineNotes ? `<div class="timeline-note">Wine: ${v.wineNotes}</div>` : ''}
            </div>
          `;
        });
        visitsHtml += '</div></div>';
      }
      document.getElementById('detailVisits').innerHTML = visitsHtml;
    }

    function renderDiscoveries() {
      const active = (S.discoveries || []).filter(d => d.status === 'new' || d.status === 'added');
      const container = document.getElementById('discoveryCards');
      const sources = [...new Set(active.map(d => d.source?.name))];

      let sourceFilters = sources.map(s => `<div class="chip" data-filter="${s}">${s}</div>`).join('');
      document.getElementById('sourceFilters').innerHTML = sourceFilters;

      container.innerHTML = active.map(d => `
        <div class="discovery-card">
          <div class="discovery-header">
            <div class="discovery-info">
              <div class="discovery-name">${d.name}</div>
              <div class="discovery-source">${d.source?.name || 'Unknown'}</div>
              <div class="discovery-date">Found: ${d.dateFound}</div>
            </div>
          </div>
          <div class="discovery-actions">
            <button class="btn btn-primary btn-small" onclick="onDiscoveryAction('add', '${d.id}')">Add to List</button>
            <button class="btn btn-secondary btn-small" onclick="onDiscoveryAction('research', '${d.id}')">Research</button>
            <button class="btn btn-danger btn-small" onclick="onDiscoveryAction('dismiss', '${d.id}')">Dismiss</button>
          </div>
        </div>
      `).join('');
    }

    function renderMap() {
      const byNeighborhood = {};
      S.restaurants.forEach(r => {
        const n = r.neighborhood || 'Other';
        if (!byNeighborhood[n]) byNeighborhood[n] = [];
        byNeighborhood[n].push(r);
      });

      const container = document.getElementById('mapContainer');
      container.innerHTML = Object.entries(byNeighborhood).map(([name, restaurants]) => `
        <div class="neighborhood">
          <div class="neighborhood-name">${name}</div>
          <div class="neighborhood-count">${restaurants.length} restaurants</div>
          <div style="margin-top: 0.5rem; font-size: 11px; color: var(--text2);">
            ${restaurants.map(r => r.name).join(', ')}
          </div>
        </div>
      `).join('');
    }

    function renderPreferences() {
      const pref = calculatePreferences();
      const html = `
        <h4 style="margin-bottom: 1rem; color: var(--text2); font-size: 12px;">Based on your dining patterns:</h4>
        ${Object.entries(pref).map(([key, val]) => `
          <div style="margin-bottom: 1.5rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
              <span style="font-size: 13px; font-weight: 600; text-transform: capitalize;">${key.replace(/([A-Z])/g, ' $1')}</span>
              <span style="font-size: 13px; color: var(--text2);">${(val * 100).toFixed(0)}%</span>
            </div>
            <div class="bar-fill"><div class="bar-value" style="width: ${val * 100}%"></div></div>
          </div>
        `).join('')}
      `;
      document.getElementById('preferencesContent').innerHTML = html;
    }

    function calculatePreferences() {
      const restaurants = S.restaurants.filter(r => r.status !== 'skip');
      if (restaurants.length === 0) return {};

      const prefs = {
        upscale: 0, romantic: 0, lively: 0, casual: 0, scene: 0,
        dateNight: 0, business: 0, special: 0,
      };

      restaurants.forEach(r => {
        if (r.atmosphere) prefs[r.atmosphere] = (prefs[r.atmosphere] || 0) + 1;
        (r.bestFor || []).forEach(bf => {
          if (bf === 'date-night') prefs.dateNight++;
          else if (bf === 'business') prefs.business++;
          else if (bf === 'special-occasion') prefs.special++;
        });
      });

      const total = Object.values(prefs).reduce((a, b) => a + b, 1);
      Object.keys(prefs).forEach(k => prefs[k] = Math.min(prefs[k] / total, 1));
      return prefs;
    }

    // ============ DINING PREFERENCES (SAVE/LOAD) ============
    let prefSaveTimeout = null;

    async function loadDiningPrefs() {
      if (!S.user || !S.db) return;
      try {
        const { doc } = window.firebaseModules;
        const { getDoc } = await import('https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js');
        const ref = doc(S.db, `users/${S.user.uid}/settings`, 'diningPrefs');
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const data = snap.data();
          document.getElementById('mattPrefsInput').value = data.matt || '';
          document.getElementById('denisePrefsInput').value = data.denise || '';
        }
      } catch (e) { console.log('loadDiningPrefs error:', e); }
    }

    async function saveDiningPrefs() {
      if (!S.user || !S.db) return;
      try {
        const { doc, setDoc } = window.firebaseModules;
        const ref = doc(S.db, `users/${S.user.uid}/settings`, 'diningPrefs');
        await setDoc(ref, {
          matt: document.getElementById('mattPrefsInput').value,
          denise: document.getElementById('denisePrefsInput').value,
          updatedAt: new Date().toISOString()
        }, { merge: true });
      } catch (e) { console.log('saveDiningPrefs error:', e); }
    }

    function setupPrefAutoSave(inputId, savedMsgId) {
      const input = document.getElementById(inputId);
      if (!input) return;
      input.addEventListener('input', () => {
        clearTimeout(prefSaveTimeout);
        prefSaveTimeout = setTimeout(async () => {
          await saveDiningPrefs();
          const msg = document.getElementById(savedMsgId);
          msg.style.display = 'block';
          setTimeout(() => msg.style.display = 'none', 2000);
        }, 1000);
      });
    }

    setupPrefAutoSave('mattPrefsInput', 'mattPrefsSaved');
    setupPrefAutoSave('denisePrefsInput', 'denisePrefsSaved');

    // ============ VIDEO SPEED ============
    const loginVid = document.getElementById('loginVideo');
    if (loginVid) loginVid.playbackRate = 0.4;
    document.querySelectorAll('.app-video-bg video').forEach(v => v.playbackRate = 0.35);

    // ============ INIT ============
    clearStarInputs();
    initFirebase();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
